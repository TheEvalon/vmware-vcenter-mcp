name: Bug report
description: Report a defect in the VMware vCenter MCP server.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much of
        the form as you can. **Do not paste real credentials, real
        hostnames, or real VM identifiers** -- redact them.

        For security issues, see [SECURITY.md](../blob/main/SECURITY.md)
        instead of this form.

  - type: input
    id: mcp_version
    attributes:
      label: MCP server version
      description: Run `npm pkg get version` or check the startup banner.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: vcenter_version
    attributes:
      label: vCenter Server version
      description: From `vcenter_about` or the vSphere Client.
      placeholder: "8.0.2 build 22617221"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "v20.18.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"
    validations:
      required: true

  - type: dropdown
    id: read_only
    attributes:
      label: VCENTER_READ_ONLY mode?
      options:
        - "false (writes enabled)"
        - "true (writes blocked)"
        - "not set"
    validations:
      required: true

  - type: dropdown
    id: invocation
    attributes:
      label: How was the tool invoked?
      options:
        - "Without confirm (dry-run)"
        - "With confirm: true (real execution)"
        - "Read-only tool"
        - "Other / not applicable"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tool name, redacted arguments, expected vs actual behavior.
      placeholder: |
        1. Called `vm_clone` with arguments {...}
        2. Expected: ...
        3. Actually got: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt (stderr)
      description: Run with `VCENTER_LOG_LEVEL=debug`. Redact secrets.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context

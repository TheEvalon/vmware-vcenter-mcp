<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="VMware vCenter MCP by iOblako">
  <title>VMware vCenter MCP by iOblako</title>
  <desc>Stylized cloud (oblako) with three stacked virtualized server racks inside, rendered in vCenter blue.</desc>

  <defs>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f8ff5"/>
      <stop offset="100%" stop-color="#0b5fbf"/>
    </linearGradient>
    <linearGradient id="rackFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#e8f1ff" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="#ffffff"/>

  <g filter="url(#softShadow)">
    <path d="M 128 320
             a 72 72 0 0 1 24 -140
             a 96 96 0 0 1 184 -8
             a 64 64 0 0 1 56 84
             a 56 56 0 0 1 -40 64
             H 168
             a 72 72 0 0 1 -40 -0
             Z"
          fill="url(#cloudFill)"/>
  </g>

  <g transform="translate(176 176)">
    <rect x="0" y="0" width="160" height="36" rx="6" ry="6" fill="url(#rackFill)" stroke="#0b5fbf" stroke-width="2"/>
    <circle cx="14" cy="18" r="4" fill="#1f8ff5"/>
    <circle cx="28" cy="18" r="4" fill="#1f8ff5" opacity="0.6"/>
    <rect x="48" y="12" width="98" height="12" rx="2" ry="2" fill="#cfe1fb"/>

    <rect x="0" y="48" width="160" height="36" rx="6" ry="6" fill="url(#rackFill)" stroke="#0b5fbf" stroke-width="2"/>
    <circle cx="14" cy="66" r="4" fill="#1f8ff5"/>
    <circle cx="28" cy="66" r="4" fill="#1f8ff5" opacity="0.6"/>
    <rect x="48" y="60" width="98" height="12" rx="2" ry="2" fill="#cfe1fb"/>

    <rect x="0" y="96" width="160" height="36" rx="6" ry="6" fill="url(#rackFill)" stroke="#0b5fbf" stroke-width="2"/>
    <circle cx="14" cy="114" r="4" fill="#1f8ff5"/>
    <circle cx="28" cy="114" r="4" fill="#1f8ff5" opacity="0.6"/>
    <rect x="48" y="108" width="98" height="12" rx="2" ry="2" fill="#cfe1fb"/>
  </g>

  <text x="256" y="424" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="36" fill="#0b5fbf" letter-spacing="2">vCenter MCP</text>
  <text x="256" y="458" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="18" fill="#5a7fb0" letter-spacing="6">iOBLAKO</text>
</svg>
